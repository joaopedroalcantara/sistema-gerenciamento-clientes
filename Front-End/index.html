<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Empresa S.A</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header>
  <h1>Empresa S.A</h1>
</header>

<main>

  <section id="lista-clientes">
    <div class="topo">
      <h2>Clientes</h2>
      <button class="btn-add" type="button" onclick="abrirFormulario()" title="Adicionar novo cliente">
        <i class="fa-solid fa-plus"></i>
      </button>
    </div>
    <ul id="clientes"></ul>
  </section>

  <section id="formulario" class="hidden">
    <h2 id="titulo-form">Novo Cliente</h2>
    
    <input type="hidden" id="cpfOriginal"> 

    <input type="text" id="nome" placeholder="Nome"> 
    <input type="text" id="cpf" placeholder="CPF" minlength="11" maxlength="14">
    <input type="date" id="dataDeNascimento" min="1900-01-01" max="2026-04-11">
    <input type="text" id="endereco" placeholder="Endereço">

    <div class="acoes">
      <button class="btn editar" type="button" onclick="salvarUsuario()" title="Salvar">Salvar</button>
      <button class="btn" type="button" onclick="voltar()" style="background:#555; color:white;" title="Cancelar">Cancelar</button>
    </div>
  </section>

  <section id="detalhes" class="hidden">
    <h2>Detalhes do Cliente</h2>
    <p><strong>Nome:</strong> <span id="det-nome"></span></p>
    <p><strong>CPF:</strong> <span id="det-cpf"></span></p>
    <p><strong>Data de Nasc:</strong> <span id="det-data"></span></p>
    <p><strong>Endereço:</strong> <span id="det-endereco"></span></p>
    <br>
    <button class="btn" style="background:#555; color:white;" type="button" onclick="voltar()" title="Voltar">⬅ Voltar</button>
  </section>

  <section id="contatos" class="hidden">
    <h2>Gerenciar Contatos</h2>
    
    <input type="hidden" id="contato-id">

    <div class="novo-contato">
      <select id="contato-tipo">
        <option value="TELEFONE">Telefone</option>
        <option value="EMAIL">E-mail</option>
      </select>
      <input type="text" id="contato-valor" placeholder="Número ou E-mail">
      <input type="text" id="contato-obs" placeholder="Observação (ex: Celular)">
      <button id="btn-salvar-contato" class="btn-add" type="button" onclick="salvarContato()" title="Salvar Contato">
        <i class="fa-solid fa-plus"></i>
      </button>
    </div>

    <ul id="lista-contatos"></ul>
    <br>
    <button class="btn" style="background:#555; color:white;" type="button" onclick="voltar()" title="Voltar">⬅ Voltar</button>
  </section>

</main>

<script src="app.js"></script>
</body>
</html>
